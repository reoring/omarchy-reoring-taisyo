# Hyprland opacity overrides
#
# Omarchy defaults set a small active/inactive difference in:
#   ~/.local/share/omarchy/default/hypr/windows.conf
#
# This file is sourced from ~/.config/hypr/hyprland.conf (installed by apply.sh)
# so you can keep opacity tweaks isolated and versioned.

# Make inactive windows more transparent.
# Format: opacity <active> <inactive>
windowrule = opacity 0.97 0.50, match:class .*

# Per-window opacity overrides.
#
# hypr-opacity-adjust tags the active window with e.g. alpha_0.75.
# These rules apply exact opacity values (override) and survive Hyprland reloads.
#
# Note: Tags are evaluated top-to-bottom; keep these AFTER any default opacity rule.
windowrule = match:tag alpha_0.20, opacity 0.20 override 0.20 override 0.20 override, opaque off
windowrule = match:tag alpha_0.25, opacity 0.25 override 0.25 override 0.25 override, opaque off
windowrule = match:tag alpha_0.30, opacity 0.30 override 0.30 override 0.30 override, opaque off
windowrule = match:tag alpha_0.35, opacity 0.35 override 0.35 override 0.35 override, opaque off
windowrule = match:tag alpha_0.40, opacity 0.40 override 0.40 override 0.40 override, opaque off
windowrule = match:tag alpha_0.45, opacity 0.45 override 0.45 override 0.45 override, opaque off
windowrule = match:tag alpha_0.50, opacity 0.50 override 0.50 override 0.50 override, opaque off
windowrule = match:tag alpha_0.55, opacity 0.55 override 0.55 override 0.55 override, opaque off
windowrule = match:tag alpha_0.60, opacity 0.60 override 0.60 override 0.60 override, opaque off
windowrule = match:tag alpha_0.65, opacity 0.65 override 0.65 override 0.65 override, opaque off
windowrule = match:tag alpha_0.70, opacity 0.70 override 0.70 override 0.70 override, opaque off
windowrule = match:tag alpha_0.75, opacity 0.75 override 0.75 override 0.75 override, opaque off
windowrule = match:tag alpha_0.80, opacity 0.80 override 0.80 override 0.80 override, opaque off
windowrule = match:tag alpha_0.85, opacity 0.85 override 0.85 override 0.85 override, opaque off
windowrule = match:tag alpha_0.90, opacity 0.90 override 0.90 override 0.90 override, opaque off
windowrule = match:tag alpha_0.95, opacity 0.95 override 0.95 override 0.95 override, opaque off
windowrule = match:tag alpha_1.00, opacity 1.00 override 1.00 override 1.00 override, opaque on

# Examples:
# - Disable opacity entirely:
# windowrule = opacity 1.0 1.0, match:class .*
# - Make inactive windows more transparent:
# windowrule = opacity 0.97 0.85, match:class .*
