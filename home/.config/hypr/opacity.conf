# Hyprland opacity overrides
#
# Omarchy defaults set a small active/inactive difference in:
#   ~/.local/share/omarchy/default/hypr/windows.conf
#
# This file is sourced from ~/.config/hypr/hyprland.conf (installed by apply.sh)
# so you can keep opacity tweaks isolated and versioned.

# Make inactive windows more transparent.
# Format: opacity <active> <inactive>
windowrule = opacity 0.97 0.8, match:class .*

# Examples:
# - Disable opacity entirely:
# windowrule = opacity 1.0 1.0, match:class .*
# - Make inactive windows more transparent:
# windowrule = opacity 0.97 0.85, match:class .*
